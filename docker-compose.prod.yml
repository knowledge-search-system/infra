services:

  postgres:
    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - knowledge-search-network

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    volumes:
      - redis_data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - knowledge-search-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.1

    restart: unless-stopped

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    networks:
      - knowledge-search-network

  search-engine-migrate:
    image: ghcr.io/knowledge-search-system/search-engine-migrate:latest

    restart: "no"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_DSN: ${SEARCH_ENGINE_POSTGRES_DSN}

    networks:
      - knowledge-search-network

  search-engine:
    image: ghcr.io/knowledge-search-system/search-engine:latest

    restart: unless-stopped

    env_file:
      - .env.prod

    depends_on:
      search-engine-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started

    ports:
      - "8080:8080"

    networks:
      - knowledge-search-network

  document-processor-migrate:
    image: ghcr.io/knowledge-search-system/document-processor-migrate:latest

    restart: "no"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_DSN: ${DOCUMENT_PROCESSOR_POSTGRES_DSN}

    networks:
      - knowledge-search-network

  document-processor:
    image: ghcr.io/knowledge-search-system/document-processor:latest

    restart: unless-stopped

    env_file:
      - .env.prod

    depends_on:
      document-processor-migrate:
        condition: service_completed_successfully
      search-engine:
        condition: service_started

    ports:
      - "8081:8081"

    networks:
      - knowledge-search-network

networks:
  knowledge-search-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
